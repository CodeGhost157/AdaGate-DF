dataset: ffpp
metadata_csv: /path/to/ffpp_preprocessed/metadata.csv
balance_mode: oversample_real
model: shufflenetv2
out_dir: outputs/shufflenet_ffpp_oversampled
ckpt_name: best_shufflenet_ffpp_oversampled.pt
resolutions: [128, 224, 256, 384]
image_size_for_model: 224
train_mode: multi_resolution
batch_size: 32
num_workers: 2
epochs: 15
lr: 0.0001
weight_decay: 0.0001
dropout: 0.2
mixed_precision: true
uncertain_low: 0.4
uncertain_high: 0.6
seed: 42
